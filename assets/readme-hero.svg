  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.42" stop-color="#111827"/>
      <stop offset="1" stop-color="#191b22"/>
    </linearGradient>
    <radialGradient id="hot" cx="0.24" cy="0.16" r="0.9">
      <stop offset="0" stop-color="#f15a24" stop-opacity="0.42"/>
      <stop offset="0.42" stop-color="#f15a24" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#f15a24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool" cx="0.82" cy="0.18" r="0.72">
      <stop offset="0" stop-color="#46d4ff" stop-opacity="0.34"/>
      <stop offset="0.5" stop-color="#46d4ff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#46d4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#253349" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#0d1422" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.42" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f15a24" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="#46d4ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#f7c948" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.95  0 1 0 0 0.32  0 0 1 0 0.12  0 0 0 0.75 0" result="color"/>
      <feMerge>
        <feMergeNode in="color"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="coolglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18  0 0 0 0 0.75  0 0 0 0 1  0 0 0 0.7 0" result="color"/>
      <feMerge>
        <feMergeNode in="color"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#46d4ff" fill-opacity="0.8"/>
    </marker>
  </defs>
